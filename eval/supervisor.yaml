track: supervisor
description: Multi-domain supervisor — routes cross-domain questions across Finance, SCM, and Commercial Genie spaces under OBO and fuses a single answer with a routing trace.
golden_questions:
  - id: q1
    question: "Paints EMEA gross margin dropped ~8% in Q2 2026 — is it price, volume, or a supply/service issue, and what should I do?"
    expected_answer_contains:
      - "routes to Finance AND SCM (and Commercial)"
      - "~8.9pp margin drop: price ~-3pp, FX ~-2pp, raw material ~-3pp, volume flat"
      - "Rotterdam->EMEA-DACH OTIF fell to ~89% in May with a stockout"
      - "it is BOTH a margin/cost issue and a supply/service issue"
      - "fix the Rotterdam lead-time/stockout; review TiO2 contract; protect at-risk EMEA accounts"
    expected_data_source: "<catalog>.<schema> (margin variance) + <catalog>.<schema> (OTIF/lead-time/stockout) + <catalog>.<schema> (churn) — Akzo Finance, Akzo SCM, Akzo Commercial Genie spaces"
    grading_notes: "Flagship question. Good: shows routing to >=2 domains, fuses the finance bridge with the SCM service shock, concludes it is NOT a single-cause problem, and gives concrete actions. Wrong: answers from one domain only, or fails to connect the margin miss to the supply disruption."
  - id: q2
    question: "Connect the dots: is the EMEA churn risk related to the margin and service problems we are seeing?"
    expected_answer_contains:
      - "routes to Commercial + SCM (+ Finance)"
      - "three at-risk EMEA accounts (Rhine Valley, Benelux PaintPro, Nordic Coatings) churn_score > 0.7"
      - "driven by the May 2026 Rotterdam service/OTIF disruption"
      - "same Decorative Paints x EMEA segment as the margin drop"
    expected_data_source: "<catalog>.<schema>.churn_signals + <catalog>.<schema>.otif/service_levels + <catalog>.<schema>.margin_actuals — multi-space Genie"
    grading_notes: "Good: routes Commercial+SCM, names the three accounts, and explains churn as a downstream effect of the same EMEA service shock. Wrong: treats churn, service, and margin as unrelated, or stays in a single domain."
  - id: q3
    question: "Give me one EMEA Paints situation report covering financial impact, supply status, and customer risk."
    expected_answer_contains:
      - "Finance: Q2 margin 39.6% -> 30.7%, ~8.9pp"
      - "SCM: Rotterdam lane OTIF ~89% May, stockout, service ~90.6%"
      - "Commercial: 3 accounts churn_score > 0.7"
      - "single fused summary across all three domains"
    expected_data_source: "all three Genie spaces (Finance + SCM + Commercial) fused — multi-space supervisor"
    grading_notes: "Good: a single coherent brief with one section per domain, each backed by the right numbers, plus a synthesized conclusion. Wrong: dumps three disconnected answers or drops a domain."
  - id: q4
    question: "What is the single biggest root cause behind the Paints EMEA problems this quarter?"
    expected_answer_contains:
      - "the Rotterdam->EMEA-DACH lead-time disruption (5->9 days) and May stockout"
      - "drove OTIF/service down -> churn risk"
      - "raw-material (TiO2/resin) spike + FX compounded the margin hit"
      - "supply/service disruption is the connective root cause"
    expected_data_source: "SCM (lead-time/stockout) as primary, corroborated by Finance (cost/FX) and Commercial (churn) — multi-space supervisor"
    grading_notes: "Good: prioritizes the supply disruption as the connective thread while acknowledging cost/FX as additive margin drivers. Wrong: names raw-material cost alone with no supply linkage, or refuses to prioritize."
  - id: q5
    question: "Which domains did you consult to answer the EMEA margin question, and what did each contribute?"
    expected_answer_contains:
      - "Finance Genie: margin variance decomposition"
      - "SCM Genie: OTIF/lead-time/stockout root cause"
      - "Commercial Genie: at-risk account / churn impact"
      - "routing trace shown"
    expected_data_source: "supervisor routing trace across Akzo Finance / Akzo SCM / Akzo Commercial spaces"
    grading_notes: "Good: transparently lists the spaces routed to and each one's contribution (a routing/trace answer). Wrong: claims it used only one space, or cannot explain its routing."
failing_case:
  question: "What is AkzoNobel's actual consolidated Q2 2026 group revenue and EPS as reported to investors?"
  why_it_fails: "Out of scope: all data is synthetic workshop data; there is no real audited financial filing in any Genie space. The supervisor should decline to provide real investor figures, state the data is synthetic, and offer the synthetic margin/segment analysis instead of fabricating reported financials."
measurable_value: "Cross-domain 'why' investigation that normally requires pulling 3 analysts (finance, supply, sales) into a war room -> one supervisor query fusing all three domains with a routing trace in 5-10 min."
