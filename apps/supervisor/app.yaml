# Databricks Apps manifest for the Multi-domain Supervisor agent.
# The app service principal provides SDK auth automatically (no profile needed in Apps).
# uvicorn serves both the API (/api/*) and the built React frontend (/) on the app port.
command:
  - uvicorn
  - main:app
  - --app-dir
  - "backend"
  - --host
  - "0.0.0.0"
  - --port
  - "$DATABRICKS_APP_PORT"

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "<your-warehouse-id>"
  - name: DATABRICKS_CHAT_ENDPOINT
    value: "databricks-claude-opus-4-7"
  - name: LAKEBASE_INSTANCE
    value: "<your-lakebase-instance>"
  - name: LAKEBASE_DBNAME
    value: "databricks_postgres"
  - name: LAKEBASE_SCHEMA
    value: "akzo"
  # Real Genie spaces (created from code by genie/create_genie_spaces.py). When set, each domain leg
  # calls the REAL Genie space via the Conversation API; blank a value to fall back to bundled-instruction
  # text2sql over genie/*_space.md. The app service principal needs CAN_RUN on these spaces.
  - name: FINANCE_SPACE_ID
    value: "<your-finance-space-id>"
  - name: SCM_SPACE_ID
    value: "<your-scm-space-id>"
  - name: COMMERCIAL_SPACE_ID
    value: "<your-commercial-space-id>"
