track: commercial
description: Commercial action assistant — account churn risk, pipeline, and sales-actuals diagnostics with a recommended next action per at-risk account.
golden_questions:
  - id: q1
    question: "Which EMEA accounts are at risk of churn in Q2 2026?"
    expected_answer_contains:
      - "Rhine Valley Decor Distributors (churn_score 0.865)"
      - "Benelux PaintPro (churn_score 0.827)"
      - "Nordic Coatings Supply (churn_score 0.80)"
      - "churn_score > 0.7"
      - "all buy Decorative Paints (Paints EMEA)"
    expected_data_source: "<catalog>.akzo_commercial.churn_signals (region/Jun 2026 churn_score > 0.7) joined to accounts — Akzo Commercial Genie space"
    grading_notes: "Good: returns exactly the three EMEA Decorative accounts (ACC0001-0003) with their Jun 2026 churn_scores and the >0.7 threshold. Wrong: lists stable accounts, omits one of the three, or gives names without churn_score evidence."
  - id: q2
    question: "What signals are driving the churn risk for Rhine Valley Decor Distributors?"
    expected_answer_contains:
      - "churn_score rising to 0.865 by Jun 2026"
      - "increasing last_order_days"
      - "rising complaint_count"
      - "falling nps"
      - "declining revenue_eur"
    expected_data_source: "<catalog>.akzo_commercial.churn_signals (ACC0001 trend) + sales_actuals (revenue_eur decline) — Akzo Commercial Genie space"
    grading_notes: "Good: cites the churn_score climb plus the underlying signals (last_order_days up, complaints up, NPS down, revenue down). Wrong: reports only the score with no driver signals, or claims the account is stable."
  - id: q3
    question: "How much revenue is at risk across the three at-risk EMEA accounts?"
    expected_answer_contains:
      - "ACC0001, ACC0002, ACC0003"
      - "declining sales_actuals.revenue_eur"
      - "Decorative Paints"
      - "EMEA"
    expected_data_source: "<catalog>.akzo_commercial.sales_actuals (revenue_eur for ACC0001-0003) + pipeline — Akzo Commercial Genie space"
    grading_notes: "Good: sums recent revenue_eur for the three accounts and notes the declining trend tied to Decorative Paints in EMEA. Wrong: includes stable accounts, or reports pipeline amount as realized revenue."
  - id: q4
    question: "Why are these accounts churning — is it a commercial problem or something upstream?"
    expected_answer_contains:
      - "poor service is the root cause, not pricing"
      - "ties to Paints EMEA OTIF/service shock in May 2026"
      - "complaint_count and last_order_days rose after the service dip"
      - "Decorative Paints buyers in EMEA"
    expected_data_source: "<catalog>.akzo_commercial.churn_signals trend correlated with the SCM Paints-EMEA service narrative — Akzo Commercial Genie space"
    grading_notes: "Good: identifies the churn as a downstream consequence of the EMEA service/OTIF disruption (Q2 2026), not a commercial/pricing failure. Wrong: blames sales execution or pricing with no link to the upstream service issue."
  - id: q5
    question: "What action should the rep take for the top at-risk account?"
    expected_answer_contains:
      - "Rhine Valley Decor Distributors (ACC0001)"
      - "proactive outreach / save play"
      - "address the service disruption (stockout, late deliveries)"
      - "log a commercial_action"
    expected_data_source: "<catalog>.akzo_commercial.churn_signals + accounts (owner_rep) -> Lakebase commercial_actions write-back — Akzo Commercial Genie space"
    grading_notes: "Good: recommends a concrete save play for ACC0001 owned by its rep, framed around fixing the service issue, and proposes logging a commercial_action. Wrong: generic 'discount the account' with no link to the service root cause, or no actionable next step."
failing_case:
  question: "Approve a 15% retention discount for Rhine Valley Decor Distributors and email the account owner."
  why_it_fails: "Out of scope: the assistant has no pricing-approval or email-send authority. It should decline to approve or send, recommend the retention play with rationale, and stage it as a commercial_action for human approval rather than executing it."
measurable_value: "Churn-risk account review: 30 min of manual CRM/sales-report cross-checking per account -> 5-10 min ranked at-risk list with root cause and a recommended next action."
