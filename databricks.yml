# Root Databricks Asset Bundle for the AkzoNobel Agent Bricks workshop.
#
# Scope (per plan): the reference NOTEBOOKS as a serverless workflow job. The
# Hackathon-in-the-Box HUB keeps its own bundle at
# apps/hackathon-hub/akzo-hackathon-hub/databricks.yml and deploys via
# `databricks apps deploy` (the AppKit flow). The other 4 agent apps keep their
# per-app deploy scripts under deploy/.
#
# Deploy the notebooks workflow:
#   databricks bundle validate -t dev -p fe-vm-lakebase-praneeth
#   databricks bundle deploy   -t dev -p fe-vm-lakebase-praneeth
# Then run it from the Workspace > Workflows UI, or:
#   databricks bundle run akzo_workshop_notebooks -t dev -p fe-vm-lakebase-praneeth
#
# Note: the notebooks expect the synthetic data loaded (see data/load_to_uc.py)
# and the akzo_* schemas + Lakebase + Genie spaces in place. The job provisions
# the workflow; running it green end to end is the attendee's exercise.

bundle:
  name: akzo-agent-bricks-workshop

# Sync only the notebooks into the bundle (keep the upload lean).
sync:
  include:
    - L200-capabilities/**
  exclude:
    - "**/node_modules/**"
    - "apps/**"
    - "data/output/**"

resources:
  jobs:
    akzo_workshop_notebooks:
      name: "[${bundle.target}] Akzo Agent Bricks workshop - reference notebooks"
      # Five consolidated chapters, run in order on serverless. Chapters 2 and 3 make governed external
      # calls to the Mock Systems app (behind App SSO); they run green INTERACTIVELY under the user's
      # identity. In a headless job, set the `bearer_token` notebook parameter to an authorized token
      # (or run them interactively). Provisioning the workflow is the deploy step; running each chapter
      # green is the attendee's hands-on exercise.
      tasks:
        - task_key: ch1_governed_supervisor
          notebook_task:
            notebook_path: ./L200-capabilities/01_governed_supervisor.py
        - task_key: ch2_agents_that_act
          depends_on: [{ task_key: ch1_governed_supervisor }]
          notebook_task:
            notebook_path: ./L200-capabilities/02_agents_that_act.py
        - task_key: ch3_autonomous_loop
          depends_on: [{ task_key: ch2_agents_that_act }]
          notebook_task:
            notebook_path: ./L200-capabilities/03_autonomous_loop.py
        - task_key: ch4_trust_and_governance
          depends_on: [{ task_key: ch3_autonomous_loop }]
          notebook_task:
            notebook_path: ./L200-capabilities/04_trust_and_governance.py
        - task_key: ch5_document_intelligence
          depends_on: [{ task_key: ch4_trust_and_governance }]
          notebook_task:
            notebook_path: ./L200-capabilities/05_document_intelligence.py
      queue:
        enabled: true

    # Advanced / optional chapters. Not in the CH1-CH5 dependency chain: they build + log + register
    # always, but the serving/deploy + managed-MCP steps are flag-gated (off by default), so they run
    # green without provisioning serving compute. Run them on their own from the Workflows UI.
    akzo_workshop_advanced:
      name: "[${bundle.target}] Akzo Agent Bricks workshop - advanced (agents + serving)"
      tasks:
        - task_key: ch6_custom_agents_and_mcp
          notebook_task:
            notebook_path: ./L200-capabilities/06_custom_agents_and_mcp.py
        - task_key: ch7_custom_model_serving
          depends_on: [{ task_key: ch6_custom_agents_and_mcp }]
          notebook_task:
            notebook_path: ./L200-capabilities/07_custom_model_serving.py
      queue:
        enabled: true

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://fevm-serverless-lakebase-praneeth.cloud.databricks.com
